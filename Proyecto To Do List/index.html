<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>To do list</title>
        <link rel="stylesheet" href="css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="d-flex justify-content-center align-items-center">
            <h1 class="pt-3 ">Lista de tareas</h1>
        </div>
        <div class="container">
            <form id="form-tareas" class="mb-3 row">
                <div class="container form-floating col-md-6">
                    <input type="text" name="input-tarea" id="input-tarea" placeholder="" class="form-control">
                    <label for="input-tareas" class="form-label ps-3">Tarea</label>
                </div>
                <div class="container col-md-6 form-floating">
                    
                    <select name="select-prioridad" id="select-prioridad" class="form-select" aria-label="Floating select">
                        <option value="" disabled selected>Seleccione Prioridad de la tarea</option>
                        <option value="Baja">Baja</option>
                        <option value="Media">Media</option>
                        <option value="Alta">Alta</option>
                    </select>
                    <label for="select-prioridad">Prioridad</label>
                </div>
            </form>
            <div class="container row">
                <button class="btn btn-outline-primary col-md-12" id="btnAgregar">Agregar</button>
            </div>
            
        </div>
        <div class="row justify-content-center">
            <ul id="lista-tareas" class="list-group list-group-flush col-md-9 d-flex ">

            </ul>
        </div>
        
        <template id="template-tarea">
            <li class="list-group-item d-flex justify-content-between align-items-center shadow-sm mt-3">
                <div class="contenedor-texto">
                    <span class="js-nombre-tarea">

                        
                    </span>
                </div>
                <div class="btn-group">
                    <button class="btn btn-sm btn-outline-primary btn-editar me-3">Editar</button>
                    <button class="btn btn-sm btn-outline-danger btn-eliminar">Eliminar</button>
                </div>
            </li>
        </template>



        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="js/app.js"></script>
        <script src="js/Tarea.js   "></script>
    </body>
</html>
