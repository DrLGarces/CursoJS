<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Presupuesto</title>
</head>
<body>
    <header>
        <h1>PRESUPUESTO</h1>
    </header>
    <div class="container">
        <div class="row">
            <div class="saldo-actual saldos"> 
                
            </div>
    </div>
        <div class="row">
            <div class="contenedor-ingresos saldos">
                
            </div>
            <div class="contenedor-egresos saldos">
                
            </div>
        </div>
        <div class="row">
            <div class="contenedor-form">
                <form id="form-movimiento">
                    <div class="form-floating">
                        <select id="tipo" name="tipo" class="formulario form-select" >
                            <option selected value="Ingreso">Ingreso</option>
                            <option value="Egreso">Egreso</option>
                        </select>
                        <label for="tipo">Tipo de movimiento</label>
                    </div>
                

                    <div class="form-floating">
                        <input class="formulario form-control" type="text" id="descripcion" name="descripcion" placeholder="Salario">
                        <label for="descripcion" class="form-label">Descripción</label>
                    </div>


                    <div class="form-floating">
                        <input class="formulario form-control" type="number" id="monto" placeholder="200" name="monto">
                        <label for="monto" class="form-label">Monto</label>
                    </div>


                    <input id="btnAgregar"class="formulario btn btn-secundary" type="submit" value="✅">
                </form>
            </div>
        </div>
    
        <div class="row mt-4 contenedor-saldos">
            <div class="tabla-columna">
                <div class="contenedor-form">
                    <h3 class="h5 mb-3" style="color: #10b981; font-weight: 600;">Historial de Ingresos</h3>
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Descripción</th>
                                <th>Monto</th>
                            </tr>
                        </thead>
                <tbody id="tabla-ingresos">
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="tabla-columna">
        <div class="contenedor-form">
            <h3 class="h5 mb-3" style="color: #ef4444; font-weight: 600;">Historial de Egresos</h3>
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Descripción</th>
                        <th>Monto</th>
                    </tr>
                </thead>
                <tbody id="tabla-egresos">
                    
                </tbody>
            </table>
        </div>
    </div>
</div>
</div>
<template id="template-fila">
    
</template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
