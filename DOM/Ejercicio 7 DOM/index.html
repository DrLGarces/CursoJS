<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de nombre </title>
</head>
<body>
    <h1>Validador de nombre</h1>
    <div class="container">
        <form id="formValidador">
            Nombre: <input type="text" name="username" id="username" placeholder="HideOnBush">
            <br>

        </form>
        <p id="mensaje"></p>
    </div>

<script>
    document.getElementById("username").oninput = validar;

    function validar(){
        let username = document.forms["formValidador"]["username"];
        console.log(username.value);
        if(username.value.length < 5){
            document.getElementById("username").classList.remove("input_ok");
            document.getElementById("username").classList.add("input_error");
            document.getElementById("mensaje").innerHTML = "Texto muy corto";
        }else{
            document.getElementById("username").classList.remove("input_error");
            document.getElementById("username").classList.add("input_ok");
            document.getElementById("mensaje").innerHTML = "¡Nickname EPICO!";
        }
    }

</script>
</body>
</html>
